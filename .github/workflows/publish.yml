name: Publish to crates.io

on:
  push:
    branches: [main]
    paths:
      - grammar.json
      - src/**
      - .github/workflows/test.yml
  workflow_dispatch:

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check whether the version needs publishing
        id: check
        run: |
          local="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "tree-sitter-autohotkey") | .version')"
          published="$(curl -s "https://crates.io/api/v1/crates/tree-sitter-autohotkey" \
            -H 'User-Agent: tree-sitter-autohotkey-ci' \
            | jq -r '.versions[].num' 2>/dev/null || true)"
          echo "Cargo.toml version: $local"
          if echo "$published" | grep -qx "$local"; then
            echo "Version $local already on crates.io - nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $local is new - will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Tree-sitter CLI
        uses: tree-sitter/setup-action@v2
        with:
          install-lib: false

      # Regenerate so the committed artifacts can't drift from grammar.js.
      - run: tree-sitter generate
      - run: tree-sitter test

      - name: Publish
        if: steps.check.outputs.publish == 'true'
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
